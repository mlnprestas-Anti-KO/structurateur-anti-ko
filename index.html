// ══════════════════════════════════════════
// COMPOSANT PRINCIPAL
// ══════════════════════════════════════════
function AntiKO() {
  const [screen, setScreen]     = useState("landing");
  const [step, setStep]         = useState(0);
  const [answers, setAnswers]   = useState({});
  const [textVal, setTextVal]   = useState("");
  const [result, setResult]     = useState(null);
  const [errMsg, setErrMsg]     = useState("");
  const [loadIdx, setLoadIdx]   = useState(0);
  const [copied, setCopied]     = useState(false);
  const [scoreAnim, setScoreAnim] = useState(0);
  const [unlocked, setUnlocked] = useState(false);
  const [codeInput, setCodeInput] = useState("");
  const [codeError, setCodeError] = useState("");

  const LOAD_MSGS = ["Analyse de ton profil…","Structuration de l'offre…","Calibrage du pricing…","Génération du plan 10 jours…","Rédaction du script…","Finalisation Anti K.O™…"];

  const cur    = STEPS[step] || STEPS[0];
  const isLast = step === STEPS.length - 1;
  const pct    = Math.round(((step + 1) / STEPS.length) * 100);
  const curVal = cur.type === "text" ? textVal : (answers[cur.id] || "");
  const canNext = curVal.trim().length >= (cur.minLen || 1);

  const goNext = async () => {
    if (!canNext) return;
    const next = { ...answers, [cur.id]: curVal };
    setAnswers(next);
    if (isLast) { await generate(next); }
    else { setStep(s => s + 1); setTextVal(""); }
  };

  const goBack = () => {
    if (step === 0) { setScreen("landing"); return; }
    const prev = STEPS[step - 1];
    setStep(s => s - 1);
    setTextVal(prev.type === "text" ? (answers[prev.id] || "") : "");
  };

  const generate = async (data) => {
    setScreen("loading"); setErrMsg(""); setLoadIdx(0);
    const iv = setInterval(() => setLoadIdx(i => Math.min(i + 1, LOAD_MSGS.length - 1)), 1900);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": CONFIG.apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 2000, messages: [{ role: "user", content: buildPrompt(data) }] }),
      });
      if (!resp.ok) { setErrMsg(`Erreur API (${resp.status}). Réessaie.`); setScreen("quiz"); return; }
      const raw = await resp.json();
      if (raw.error) { setErrMsg(`Erreur : ${raw.error.message}`); setScreen("quiz"); return; }
      const txt = (raw.content?.[0]?.text || "").replace(/```json|```/g, "").trim();
      if (!txt) { setErrMsg("Réponse vide. Réessaie."); setScreen("quiz"); return; }
      let parsed;
      try { parsed = JSON.parse(txt); } catch(e) { setErrMsg(`Format inattendu. Réessaie.`); setScreen("quiz"); return; }
      parsed.prenom = data.prenom;
      setResult(parsed); setScoreAnim(0); setScreen("result");
      setTimeout(() => setScoreAnim(parsed.score || 0), 300);
    } catch(e) { setErrMsg(`Erreur réseau : ${e.message}`); setScreen("quiz"); }
    finally { clearInterval(iv); }
  };

  const reset = () => {
    setScreen("landing"); setStep(0); setAnswers({}); setTextVal("");
    setResult(null); setErrMsg(""); setLoadIdx(0); setCopied(false);
    setScoreAnim(0); setUnlocked(false); setCodeInput(""); setCodeError("");
  };

  const checkCode = () => {
    if (codeInput.trim().toUpperCase() === CONFIG.accessCode) { setUnlocked(true); setCodeError(""); }
    else { setCodeError("Code incorrect. Vérifie l'email reçu après ton achat."); }
  };

  const exportPDF = () => {
    const html = buildExportHTML(result);
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const win  = window.open(url, "_blank");
    if (!win) { const a = document.createElement("a"); a.href = url; a.download = `plan-anti-ko.html`; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  };

  const copyScript = () => {
    const txt = `Objet : ${result?.script?.objet}\n\n${result?.script?.corps}`;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); });
    } else {
      const ta = document.createElement("textarea"); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 2500);
    }
  };

  // ── Styles ──
  const btn = (v="primary", extra={}) => ({ background: v==="primary"?C.rouge:"transparent", border: v==="primary"?"none":`1px solid ${C.light}`, color: v==="primary"?"#fff":C.mid, padding:"12px 24px", cursor:"pointer", fontFamily:"monospace", fontSize:"11px", letterSpacing:"2.5px", transition:"opacity 0.15s", ...extra });
  const card = { background:C.white, border:`1px solid ${C.light}`, padding:"22px", marginBottom:"10px" };
  const lbl  = { fontSize:"9px", letterSpacing:"3px", color:C.rouge, fontFamily:"monospace", marginBottom:"12px", display:"block", textTransform:"uppercase" };
  const page = { minHeight:"100vh", background:C.bg, fontFamily:"Georgia, 'Times New Roman', serif", color:C.dark };
  const hdr  = (x={}) => ({ borderBottom:`1px solid ${C.light}`, padding:"16px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", background:C.bg, ...x });

  // ══════════════════════════════════════════
  // LANDING
  // ══════════════════════════════════════════
  if (screen === "landing") return (
    <div style={page}>
      <header style={hdr()}>
        <div style={{display:"flex",alignItems:"baseline",gap:"10px"}}>
          <span style={{fontSize:"17px",fontWeight:"700",color:C.rouge}}>Anti K.O™</span>
          <span style={{fontSize:"10px",letterSpacing:"3px",color:"#B8A898",fontFamily:"monospace"}}>by {CONFIG.site}</span>
        </div>
        <a href={`mailto:${CONFIG.email}`} style={{fontSize:"10px",color:C.mid,fontFamily:"monospace",letterSpacing:"1px",textDecoration:"none"}}>Contacter {CONFIG.prenom}</a>
      </header>

      <div style={{maxWidth:"640px",margin:"0 auto",padding:"56px 24px 80px"}}>
        <div style={{fontSize:"10px",letterSpacing:"4px",color:C.rouge,fontFamily:"monospace",marginBottom:"18px"}}>STRUCTURATEUR COMMERCIAL IA — MÉTHODE ANTI K.O™</div>
        <h1 style={{fontSize:"clamp(26px,5vw,44px)",fontWeight:"400",lineHeight:"1.18",letterSpacing:"-0.5px",margin:"0 0 20px"}}>
          Ton offre structurée,<br/>ton pricing posé,<br/><em style={{color:C.rouge,fontStyle:"italic"}}>ton plan prêt en 5 minutes.</em>
        </h1>
        <p style={{fontSize:"15px",color:"#4A3828",lineHeight:"1.75",margin:"0 0 36px",maxWidth:"500px"}}>
          8 questions. Une analyse IA basée sur la méthode Anti K.O™. Tu repars avec une offre structurée, un pricing justifié, un plan d'action 10 jours et un script de prospection prêt à envoyer.
        </p>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"8px",marginBottom:"36px"}}>
          {[["🎯","Offre structurée","Titre · promesse · inclus · livrable"],["💶","Pricing justifié","Prix recommandé + logique de valeur"],["📅","Plan 10 jours","Actions concrètes + résultats attendus"],["✉️","Script prêt","Message à copier-coller directement"]].map(([ico,t,sub]) => (
            <div key={t} style={{background:C.cream,padding:"16px 14px",display:"flex",gap:"12px",alignItems:"flex-start"}}>
              <span style={{fontSize:"20px",flexShrink:0}}>{ico}</span>
              <div><div style={{fontSize:"13px",fontWeight:"600",marginBottom:"3px"}}>{t}</div><div style={{fontSize:"11px",color:C.mid,lineHeight:"1.4"}}>{sub}</div></div>
            </div>
          ))}
        </div>

          <button onClick={() => { setScreen("quiz"); setStep(0); setTextVal(""); }} style={{...btn("primary"),padding:"15px 36px",fontSize:"12px",letterSpacing:"3px"}}>
            DÉMARRER MON DIAGNOSTIC →
          </button>
          <span style={{fontSize:"11px",color:"#B8A898",fontFamily:"monospace"}}>8 questions · 5 min</span>
        </div>

          <div style={{fontSize:"9px",letterSpacing:"3px",color:"#B8A898",fontFamily:"monospace",marginBottom:"18px"}}>ELLES ONT APPLIQUÉ LE PLAN</div>
          {CONFIG.temoignages.map((t,i) => (
            <div key={i} style={{background:C.white,border:`1px solid ${C.light}`,padding:"16px 18px",display:"flex",gap:"14px",alignItems:"flex-start",marginBottom:"8px"}}>
              <div style={{width:"32px",height:"32px",background:C.rouge,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"13px",fontWeight:"700",flexShrink:0}}>{t.nom[0]}</div>
              <div>
                <div style={{fontSize:"13px",color:C.dark,lineHeight:"1.55",marginBottom:"5px"}}>"{t.texte}"</div>
                <div style={{fontSize:"10px",color:C.mid,fontFamily:"monospace"}}>{t.nom} · {t.metier}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
          <div style={{width:"40px",height:"40px",background:C.rouge,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"16px",fontWeight:"700",flexShrink:0}}>{CONFIG.prenom[0]}</div>
          <div>
            <div style={{fontSize:"13px",fontWeight:"600",marginBottom:"2px"}}>{CONFIG.prenom} Rougemaille</div>
            <div style={{fontSize:"11px",color:C.mid}}>Architecte commerciale · MLNPrestas · Méthode Anti K.O™</div>
          </div>
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════════════════
  // LOADING
  // ══════════════════════════════════════════
  if (screen === "loading") return (
    <div style={{...page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"28px"}}>
      <div style={{width:"46px",height:"46px",border:`2px solid ${C.light}`,borderTopColor:C.rouge,borderRadius:"50%",animation:"spin 0.9s linear infinite"}} />
      <div style={{textAlign:"center"}}>
        <p style={{fontSize:"18px",margin:"0 0 6px",letterSpacing:"-0.2px"}}>{LOAD_MSGS[loadIdx]}</p>
        <p style={{fontSize:"10px",color:"#B8A898",fontFamily:"monospace",letterSpacing:"2px",margin:0}}>MÉTHODE ANTI K.O™</p>
      </div>
      <div style={{display:"flex",gap:"7px"}}>
        {LOAD_MSGS.map((_,i) => <div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:i<=loadIdx?C.rouge:C.light,transition:"background 0.4s"}} />)}
      </div>
    </div>
  );

  // ══════════════════════════════════════════
  // QUIZ
  // ══════════════════════════════════════════
  if (screen === "quiz") return (
    <div style={page}>
      <header style={hdr()}>
        <div style={{display:"flex",alignItems:"baseline",gap:"10px"}}>
          <span style={{fontSize:"16px",fontWeight:"700",color:C.rouge}}>Anti K.O™</span>
          <span style={{fontSize:"10px",letterSpacing:"3px",color:"#B8A898",fontFamily:"monospace"}}>DIAGNOSTIC</span>
        </div>
        <button onClick={reset} style={btn("secondary",{padding:"6px 14px",fontSize:"9px"})}>QUITTER</button>
      </header>

      <div style={{maxWidth:"540px",margin:"0 auto",padding:"48px 24px"}}>
        <div style={{marginBottom:"44px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"7px"}}>
            <span style={{fontSize:"10px",fontFamily:"monospace",color:"#B8A898",letterSpacing:"2px"}}>ÉTAPE {step+1} / {STEPS.length}</span>
            <span style={{fontSize:"10px",fontFamily:"monospace",color:C.rouge,letterSpacing:"2px"}}>{pct}%</span>
          </div>
          <div style={{height:"2px",background:C.light,borderRadius:"2px"}}>
            <div style={{height:"100%",background:C.rouge,width:`${pct}%`,transition:"width 0.4s ease",borderRadius:"2px"}} />
          </div>
          <div style={{display:"flex",marginTop:"8px",gap:"2px"}}>
            {STEPS.map((_,i) => <div key={i} style={{flex:1,height:"3px",background:i<=step?C.rouge:C.cream,transition:"background 0.3s",borderRadius:"2px"}} />)}
          </div>
        </div>

        <h2 style={{fontSize:"clamp(18px,3.5vw,26px)",fontWeight:"400",lineHeight:"1.35",margin:"0 0 8px",letterSpacing:"-0.2px"}}>{cur.question}</h2>
        {cur.aide && <p style={{fontSize:"12px",color:C.mid,margin:"0 0 28px",fontStyle:"italic",lineHeight:"1.5"}}>{cur.aide}</p>}
        {!cur.aide && <div style={{marginBottom:"28px"}} />}

        {cur.type === "text" && (
          <div style={{marginBottom:"28px"}}>
            <textarea autoFocus value={textVal} onChange={e=>setTextVal(e.target.value)}
              placeholder={cur.placeholder} rows={cur.id==="prenom"?1:3}
              onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))goNext();}}
              style={{width:"100%",background:"transparent",border:"none",borderBottom:`2px solid ${canNext?C.rouge:C.light}`,padding:"10px 0",fontSize:cur.id==="prenom"?"22px":"15px",color:C.dark,fontFamily:"Georgia,serif",outline:"none",resize:"none",lineHeight:"1.6",transition:"border-color 0.25s"}} />
            {textVal.length>0&&!canNext&&<p style={{fontSize:"10px",color:C.orange,fontFamily:"monospace",marginTop:"5px"}}>Un peu plus de détail pour un résultat précis…</p>}
            {cur.id!=="prenom"&&<p style={{fontSize:"10px",color:"#C8B8A8",fontFamily:"monospace",marginTop:"5px",letterSpacing:"1px"}}>Ctrl+Entrée pour continuer</p>}
          </div>
        )}

        {cur.type === "choice" && (
          <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"28px"}}>
            {cur.options.map(opt => {
              const sel = answers[cur.id]===opt;
              return <button key={opt} onClick={()=>setAnswers(p=>({...p,[cur.id]:opt}))} style={{background:sel?C.rouge:"transparent",border:`1px solid ${sel?C.rouge:C.light}`,color:sel?"#fff":"#4A3828",padding:"13px 18px",textAlign:"left",cursor:"pointer",fontSize:"14px",fontFamily:"Georgia,serif",lineHeight:"1.4",transition:"all 0.15s",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{width:"14px",height:"14px",border:`1.5px solid ${sel?"#fff":C.light}`,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {sel&&<span style={{width:"6px",height:"6px",borderRadius:"50%",background:C.rouge,display:"block"}} />}
                </span>
                {opt}
              </button>;
            })}
          </div>
        )}

        {errMsg && <div style={{background:"#FFF0F0",border:"1px solid #FFCCCC",padding:"12px 16px",marginBottom:"16px",fontSize:"12px",color:C.rouge}}>{errMsg}</div>}

        <div style={{display:"flex",justifyContent:"space-between",gap:"10px"}}>
          <button onClick={goBack} style={btn("secondary",{padding:"12px 20px"})}>← RETOUR</button>
          <button onClick={goNext} disabled={!canNext} style={btn("primary",{opacity:canNext?1:0.3,cursor:canNext?"pointer":"not-allowed"})}>
            {isLast?"GÉNÉRER MON PLAN →":"SUIVANT →"}
          </button>
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════════════════
  // RÉSULTAT
  // ══════════════════════════════════════════
  if (screen === "result" && result) return (
    <div style={page}>
      <header style={hdr()}>
        <div style={{display:"flex",alignItems:"baseline",gap:"10px"}}>
          <span style={{fontSize:"16px",fontWeight:"700",color:C.rouge}}>Anti K.O™</span>
          <span style={{fontSize:"10px",letterSpacing:"3px",color:"#B8A898",fontFamily:"monospace"}}>PLAN DE {(result.prenom||"").toUpperCase()}</span>
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          {unlocked&&<button onClick={exportPDF} style={btn("primary",{padding:"8px 16px",fontSize:"10px"})}>↓ PDF</button>}
          <button onClick={reset} style={btn("secondary",{padding:"8px 14px",fontSize:"10px"})}>RECOMMENCER</button>
        </div>
      </header>

      <div style={{maxWidth:"740px",margin:"0 auto",padding:"28px 20px 60px"}}>

        {/* Score */}
        <div style={{background:C.cream,borderLeft:`4px solid ${C.rouge}`,padding:"18px 22px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"22px"}}>
          <div style={{position:"relative",width:"70px",height:"70px",flexShrink:0}}>
            <svg width="70" height="70" viewBox="0 0 70 70">
              <circle cx="35" cy="35" r="28" fill="none" stroke={C.light} strokeWidth="5"/>
              <circle cx="35" cy="35" r="28" fill="none" stroke={C.rouge} strokeWidth="5"
                strokeDasharray={`${2*Math.PI*28*scoreAnim/100} ${2*Math.PI*28}`}
                strokeLinecap="round" transform="rotate(-90 35 35)"
                style={{transition:"stroke-dasharray 1.2s ease"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",fontWeight:"700",color:C.rouge,fontFamily:"monospace"}}>{scoreAnim}</div>
          </div>
          <div>
            <div style={{fontSize:"16px",fontWeight:"600",marginBottom:"4px"}}>{result.score_label}</div>
            <div style={{fontSize:"13px",color:C.mid,lineHeight:"1.5"}}>{result.score_detail}</div>
          </div>
        </div>

        {/* Hero */}
        <div style={{background:C.rouge,color:"#fff",padding:"28px 32px",marginBottom:"10px"}}>
          <div style={{fontSize:"9px",letterSpacing:"4px",color:"rgba(255,255,255,0.4)",fontFamily:"monospace",marginBottom:"10px"}}>TON OFFRE ANTI K.O™</div>
          <h2 style={{fontSize:"clamp(20px,3.5vw,32px)",fontWeight:"400",margin:"0 0 10px",letterSpacing:"-0.3px"}}>{result.titre}</h2>
          <p style={{fontSize:"14px",color:"rgba(255,255,255,0.9)",margin:0,lineHeight:"1.65"}}>{result.promesse}</p>
        </div>

        {/* PAYWALL */}
        {!unlocked && (
          <div style={{position:"relative",marginBottom:"10px"}}>
            {/* Preview floutée */}
            <div style={{filter:"blur(5px)",pointerEvents:"none",userSelect:"none",opacity:0.45}}>
              <div style={card}>
                <span style={lbl}>Structure de l'offre</span>
                <p style={{fontSize:"13px",color:"#2A1A0A",lineHeight:"1.7",margin:"0 0 16px"}}>Une offre premium structurée autour de ton expertise, avec un positionnement clair et différenciant qui justifie ton tarif.</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:"6px",marginBottom:"16px"}}>
                  {["Module 1 de ton offre","Module 2 de ton offre","Module 3 de ton offre","Module 4 de ton offre"].map((it,i)=>(
                    <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start",background:C.cream,padding:"9px 12px"}}>
                      <span style={{color:C.rouge,fontWeight:"700",flexShrink:0}}>✓</span>
                      <span style={{fontSize:"12px",color:"#4A3828",lineHeight:"1.4"}}>{it}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:"10px",marginBottom:"10px"}}>
                <div style={{background:C.white,border:`1px solid ${C.light}`,padding:"22px"}}>
                  <span style={lbl}>Pricing recommandé</span>
                  <div style={{fontSize:"38px",fontWeight:"700",color:C.rouge,letterSpacing:"-1.5px",lineHeight:1,marginBottom:"4px"}}>XXXX€</div>
                </div>
                <div style={{background:C.orangeBg,borderLeft:`4px solid ${C.orange}`,padding:"22px"}}>
                  <span style={{...lbl,color:C.orange}}>⚠ Erreur à éviter</span>
                  <p style={{fontSize:"12px",color:"#3A2010",lineHeight:"1.65",margin:0}}>L'erreur principale à éviter dans ta situation est dans ton plan complet.</p>
                </div>
              </div>
              <div style={card}>
                <span style={lbl}>Plan d'action 10 jours</span>
                {[1,2,3,4,5].map(i=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"64px 1fr",gap:"12px",borderBottom:`1px solid ${C.cream}`,padding:"11px 0"}}>
                    <div style={{fontSize:"10px",fontFamily:"monospace",color:C.rouge,fontWeight:"700"}}>J{i*2-1}–J{i*2}</div>
                    <div>
                      <div style={{height:"14px",background:C.cream,borderRadius:"2px",marginBottom:"4px"}} />
                      <div style={{height:"11px",background:C.light,borderRadius:"2px",width:"60%"}} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Overlay */}
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(250,247,242,0.75)",backdropFilter:"blur(2px)"}}>
              <div style={{background:C.white,border:`1px solid ${C.light}`,padding:"32px 28px",maxWidth:"380px",width:"90%",textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,0.1)"}}>
                <div style={{fontSize:"28px",marginBottom:"12px"}}>🔒</div>
                <div style={{fontSize:"10px",letterSpacing:"3px",color:C.rouge,fontFamily:"monospace",marginBottom:"12px"}}>PLAN COMPLET</div>
                <p style={{fontSize:"14px",color:C.dark,lineHeight:"1.65",margin:"0 0 6px"}}>
                  Ton offre, ton pricing, ton plan 10 jours et ton script de prospection sont prêts.
                </p>
                <p style={{fontSize:"12px",color:C.mid,margin:"0 0 22px"}}>Déverrouille ton plan complet pour accéder à tout.</p>
                <div style={{fontSize:"36px",fontWeight:"700",color:C.rouge,letterSpacing:"-1px",marginBottom:"4px"}}>{CONFIG.prixOutil}</div>
                <div style={{fontSize:"10px",color:"#B8A898",fontFamily:"monospace",marginBottom:"20px"}}>Accès immédiat · Export PDF inclus</div>
                <a href={CONFIG.systemeioURL} target="_blank" rel="noopener noreferrer"
                  style={{display:"block",background:C.rouge,color:"#fff",padding:"14px 24px",fontFamily:"monospace",fontSize:"11px",letterSpacing:"2.5px",textDecoration:"none",marginBottom:"16px"}}>
                  ACHETER MON PLAN →
                </a>
                <div style={{height:"1px",background:C.light,margin:"0 0 16px"}} />
                <div style={{fontSize:"10px",color:"#B8A898",fontFamily:"monospace",marginBottom:"8px",letterSpacing:"1px"}}>DÉJÀ ACHETÉ ? Entre ton code :</div>
                <div style={{display:"flex",gap:"8px"}}>
                  <input type="text" value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase())}
                    onKeyDown={e=>e.key==="Enter"&&checkCode()} placeholder="CODE D'ACCÈS"
                    style={{flex:1,background:C.bg,border:`1px solid ${codeError?"#FFCCCC":C.light}`,padding:"10px 12px",fontFamily:"monospace",fontSize:"11px",letterSpacing:"2px",color:C.dark,outline:"none",textTransform:"uppercase"}} />
                  <button onClick={checkCode} style={{background:C.dark,border:"none",color:"#fff",padding:"10px 16px",cursor:"pointer",fontFamily:"monospace",fontSize:"10px",letterSpacing:"1px"}}>OK</button>
                </div>
                {codeError && <p style={{fontSize:"11px",color:C.rouge,margin:"8px 0 0",fontFamily:"monospace"}}>{codeError}</p>}
              </div>
            </div>
          </div>
        )}

        {/* Plan complet déverrouillé */}
        {unlocked && <>
          <div style={card}>
            <span style={lbl}>Structure de l'offre</span>
            <p style={{fontSize:"13px",color:"#2A1A0A",lineHeight:"1.7",margin:"0 0 16px"}}>{result.offre?.description}</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:"6px",marginBottom:"16px"}}>
              {(result.offre?.inclus||[]).map((it,i)=>(
                <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start",background:C.cream,padding:"9px 12px"}}>
                  <span style={{color:C.rouge,fontWeight:"700",flexShrink:0}}>✓</span>
                  <span style={{fontSize:"12px",color:"#4A3828",lineHeight:"1.4"}}>{it}</span>
                </div>
              ))}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"28px",borderTop:`1px solid ${C.light}`,paddingTop:"14px"}}>
              <div><div style={{fontSize:"8px",fontFamily:"monospace",color:"#B8A898",letterSpacing:"2px",marginBottom:"2px"}}>DURÉE</div><div style={{fontSize:"12px"}}>{result.offre?.duree}</div></div>
              <div><div style={{fontSize:"8px",fontFamily:"monospace",color:"#B8A898",letterSpacing:"2px",marginBottom:"2px"}}>LIVRABLE</div><div style={{fontSize:"12px"}}>{result.offre?.livrable}</div></div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:"10px",marginBottom:"10px"}}>
            <div style={{background:C.white,border:`1px solid ${C.light}`,padding:"22px"}}>
              <span style={lbl}>Pricing recommandé</span>
              <div style={{fontSize:"38px",fontWeight:"700",color:C.rouge,letterSpacing:"-1.5px",lineHeight:1,marginBottom:"4px"}}>{result.pricing?.prix}</div>
              <div style={{fontSize:"10px",color:"#B8A898",fontFamily:"monospace",marginBottom:"10px"}}>Fourchette · {result.pricing?.fourchette}</div>
              <div style={{display:"inline-block",background:C.cream,padding:"3px 10px",fontSize:"9px",fontFamily:"monospace",color:C.mid,marginBottom:"12px"}}>{result.pricing?.niveau}</div>
              <p style={{fontSize:"12px",color:"#4A3828",lineHeight:"1.55",margin:0}}>{result.pricing?.logique}</p>
            </div>
            <div style={{background:C.orangeBg,borderLeft:`4px solid ${C.orange}`,padding:"22px"}}>
              <span style={{...lbl,color:C.orange}}>⚠ Erreur à éviter</span>
              <p style={{fontSize:"12px",color:"#3A2010",lineHeight:"1.65",margin:0}}>{result.alerte}</p>
            </div>
          </div>

          <div style={card}>
            <span style={lbl}>Plan d'action 10 jours</span>
            {(result.plan||[]).map((it,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"64px 1fr",gap:"12px",borderBottom:i<result.plan.length-1?`1px solid ${C.cream}`:"none",padding:"11px 0",alignItems:"start"}}>
                <div style={{fontSize:"10px",fontFamily:"monospace",color:C.rouge,fontWeight:"700",letterSpacing:"0.5px",paddingTop:"2px"}}>{it.j}</div>
                <div><div style={{fontSize:"13px",lineHeight:"1.5",marginBottom:"3px"}}>{it.action}</div><div style={{fontSize:"11px",color:C.mid,fontStyle:"italic"}}>→ {it.resultat}</div></div>
              </div>
            ))}
          </div>

          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
              <span style={{...lbl,marginBottom:0}}>Script de prospection</span>
              <button onClick={copyScript} style={{background:copied?C.green:C.cream,border:"none",color:copied?"#fff":C.mid,padding:"7px 14px",cursor:"pointer",fontFamily:"monospace",fontSize:"9px",letterSpacing:"2px",transition:"all 0.2s"}}>
                {copied?"✓ COPIÉ !":"COPIER"}
              </button>
            </div>
            <div style={{background:C.cream,padding:"10px 14px",fontFamily:"monospace",fontSize:"10px",color:C.mid,marginBottom:"10px"}}>✉ Objet : {result.script?.objet}</div>
            <div style={{fontSize:"13px",color:"#2A1A0A",lineHeight:"1.8",background:C.bg,padding:"16px 18px",whiteSpace:"pre-wrap",borderLeft:`2px solid ${C.light}`}}>{result.script?.corps}</div>
          </div>

          <div style={{background:C.rouge,color:"#fff",padding:"22px 28px",display:"flex",alignItems:"flex-start",gap:"16px",marginBottom:"10px"}}>
            <div style={{fontSize:"22px",flexShrink:0,marginTop:"1px"}}>→</div>
            <div>
              <div style={{fontSize:"9px",letterSpacing:"3px",color:"rgba(255,255,255,0.4)",fontFamily:"monospace",marginBottom:"7px"}}>PROCHAINE ACTION — DANS LES 2H</div>
              <p style={{fontSize:"14px",margin:0,lineHeight:"1.6"}}>{result.action_aujourd_hui}</p>
            </div>
          </div>
        </>}

        {/* Upsell */}
        <div style={{border:`1px solid ${C.light}`,padding:"28px",textAlign:"center",marginBottom:"32px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:`linear-gradient(to right, ${C.rouge}, ${C.orange})`}} />
          <div style={{fontSize:"9px",letterSpacing:"3px",color:"#B8A898",fontFamily:"monospace",marginBottom:"12px"}}>ENVIE D'ALLER PLUS VITE ?</div>
          <p style={{fontSize:"15px",color:C.dark,lineHeight:"1.7",margin:"0 auto 8px",maxWidth:"460px"}}>
            Ce plan est un point de départ. {CONFIG.prenom} t'accompagne pour le transformer en résultats concrets — dès cette semaine.
          </p>
          <p style={{fontSize:"12px",color:C.mid,margin:"0 0 20px",fontStyle:"italic"}}>Séance intensive · {CONFIG.prixAccomp} · Résultats mesurables en 10 jours</p>
          <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
            <a href={CONFIG.calLink} target="_blank" rel="noopener noreferrer" style={{...btn("primary"),display:"inline-block",textDecoration:"none",padding:"13px 28px"}}>
              RÉSERVER MON APPEL ({CONFIG.prixAppel}) →
            </a>
            <a href={`mailto:${CONFIG.email}?subject=Accompagnement Anti K.O™`} style={{...btn("secondary"),display:"inline-block",textDecoration:"none"}}>
              ÉCRIRE À {CONFIG.prenom.toUpperCase()}
            </a>
          </div>
        </div>

        <div style={{textAlign:"center"}}>
          <p style={{fontSize:"9px",color:"#C8B8A8",fontFamily:"monospace",letterSpacing:"2px",marginBottom:"16px"}}>MÉTHODE ANTI K.O™ · {CONFIG.site.toUpperCase()}</p>
          <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
            {unlocked&&<button onClick={exportPDF} style={btn("primary")}>↓ EXPORTER EN PDF</button>}
            <button onClick={reset} style={btn("secondary")}>NOUVEAU DIAGNOSTIC</button>
          </div>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<AntiKO />, document.getElementById("root"));
</script>
</body>
</html>
